<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Caçador de Titã</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="gameContainer">
        <div id="hud">
            <div class="hudSection">
                <span>Vida:</span>
                <div class="healthBar"><div id="playerHealth" class="healthFill"></div></div>
            </div>
            <div class="hudSection">
                <span>Monstro:</span>
                <div class="healthBar"><div id="monsterHealth" class="healthFill monster"></div></div>
            </div>
            <div class="hudSection">
                <span id="weaponDisplay">Arma: Espada</span>
            </div>
            <div class="hudSection">
                <span id="killCount">Derrotas: 0</span>
            </div>
        </div>
        <canvas id="gameCanvas"></canvas>
        <div id="instructions">Use WASD ou setas para mover. Clique esquerdo para atacar. Troque arma com 1, 2, 3 ou 4.</div>
    </div>
    <script src="script.js"></script>
</body>
</html>
